<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Construction — Louis Sloot</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23326d27'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='%23e8f5e9' font-family='Georgia,serif'>L</text></svg>"
    />
    <script>
      /* Set the theme before first paint to avoid a flash. */
      document.documentElement.setAttribute(
        "data-theme",
        localStorage.getItem("theme") ||
          (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
      );
    </script>
    <link rel="stylesheet" href="style.css" />
    <script defer src="content.js"></script>
    <script defer src="site.js"></script>
  </head>
  <body>
    <div id="site-header"></div>
    <main class="container">
      <div class="construction" id="construction"></div>
      <noscript>
        <p>
          This page is under construction (and rendered with a little JavaScript).
          <a href="index.html">Back home</a>
        </p>
      </noscript>
    </main>
    <div id="site-footer"></div>
  </body>
</html>
